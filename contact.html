n><option>わからない</option></select></label></div><label class="file-label">写真・参考資料を添付<input type="file" name="attachment" accept="image/*,.pdf,.stl,.step,.stp" multiple><small>対象物・取付場所・参考イメージが分かる写真があるとスムーズです。</small></label><button class="button primary submit" type="submit">内容を送信する</button><p class="form-note">送信前に、プライバシーポリシーとご相談に関する注意事項を掲載します。</p></form></section></main><footer><a class="brand" href="index.html"><span class="brand-mark">TG</span><span>トカイ技研<small>TOKAI GIKEN</small></span></a><p>© TOKAI GIKEN</p></footer><script src="assets/script.js"></script></body></html>
