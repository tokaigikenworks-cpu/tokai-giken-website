<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="トカイ技研へのご相談・見積依頼。写真添付に対応しています。">
  <meta name="site-version" content="v8">
  <title>相談・見積依頼 | トカイ技研</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/project.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="トカイ技研 トップページ">
      <span class="brand-mark" aria-hidden="true"><img src="assets/images/tokai-giken-mark.png" alt=""></span>
      <span class="brand-name">トカイ技研<small>TOKAI GIKEN</small></span>
    </a>
    <button class="menu-button" type="button" aria-label="メニューを開く">MENU</button>
    <nav>
      <a href="index.html">TOP</a>
      <a href="service.html">SERVICE</a>
      <a href="process.html">FLOW / PRICE</a>
      <a class="nav-cta active" href="contact.html">相談する</a>
    </nav>
  </header>

  <main>
    <section class="page-hero contact-hero">
      <p class="eyebrow">CONTACT</p>
      <h1>まずは、<br>分かる範囲でお送りください。</h1>
      <p>整理されていない相談でも大丈夫です。<br>対象物や取付場所が分かる写真があると、確認が進めやすくなります。</p>
    </section>

    <section class="section form-section">
      <p class="form-guidance">「必須」の表示がない項目は任意です。</p>
      <form name="contact" method="POST" action="/api/contact" enctype="multipart/form-data">
        <input type="hidden" name="submission_token" value="">
        <label class="honeypot" aria-hidden="true">ウェブサイト<input type="text" name="website" tabindex="-1" autocomplete="off"></label>
        <div class="form-grid">
          <label>お名前 <b>必須</b><input required type="text" name="name" autocomplete="name"></label>
          <label>会社名・屋号<input type="text" name="company" autocomplete="organization"></label>
          <label>メールアドレス <b>必須</b><input required type="email" name="email" autocomplete="email"></label>
          <label>希望納期<input type="text" name="deadline" placeholder="例：○月中、未定"></label>
        </div>
        <label>相談内容 <b>必須</b><textarea required name="message" rows="7" placeholder="何を作りたいか、困っていること、使う場面などを自由に書いてください。"></textarea></label>
        <div class="form-grid">
          <label>対象物<input type="text" name="object" placeholder="例：センターコンソール、商品スタンド"></label>
          <label>車種・型式<input type="text" name="vehicle" placeholder="車両以外の場合は空欄で構いません"></label>
          <label>予算感 <span class="optional">任意</span><small class="field-help">未定でも構いません。内容に合う進め方を判断するための目安です。</small><select name="budget"><option value="">選択してください</option><option>2万円未満</option><option>2〜5万円</option><option>5〜10万円</option><option>10〜20万円</option><option>20〜30万円</option><option>30万円以上</option><option>未定</option></select></label>
          <label>3Dデータの有無<select name="data"><option value="">選択してください</option><option>ある</option><option>ない</option><option>わからない</option></select></label>
        </div>
        <div class="file-field">
          <label class="file-label">写真・参考資料を添付<input type="file" name="attachment" accept=".jpg,.jpeg,.png,.webp,.heic,.heif,.pdf,.stl,.step,.stp" multiple><small>対象物・取付場所・参考イメージが分かる写真があると確認しやすくなります。最大10点、1ファイル10MB、合計20MBまで。</small></label>
          <div class="selected-files" hidden>
            <div class="selected-files-header">
              <p class="selected-files-summary" aria-live="polite"></p>
              <button class="clear-files" type="button">すべて削除</button>
            </div>
            <ul class="selected-files-list" aria-label="選択済みファイル"></ul>
          </div>
        </div>
        <button class="button primary submit" type="submit">内容を送信する</button>
        <p class="form-status" role="status" aria-live="polite"></p>
        <p class="form-note">送信いただいた情報は、ご相談内容の確認・見積・連絡のために使用します。</p>
      </form>
    </section>
  </main>

  <footer>
    <a class="brand" href="index.html" aria-label="トカイ技研 トップページ">
      <span class="brand-mark" aria-hidden="true"><img src="assets/images/tokai-giken-mark.png" alt=""></span>
      <span class="brand-name">トカイ技研<small>TOKAI GIKEN</small></span>
    </a>
    <p>© TOKAI GIKEN</p>
  </footer>
  <script src="assets/script.js"></script>
</body>
</html>
